<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background (gray-900) -->
  <rect width="64" height="64" rx="14" fill="#111827"/>
  <!-- Paddle head (tilted for swing motion) -->
  <ellipse cx="26" cy="24" rx="14" ry="17" transform="rotate(-25 26 24)" fill="#34d399" opacity="0.9"/>
  <ellipse cx="26" cy="24" rx="12" ry="15" transform="rotate(-25 26 24)" fill="#34d399"/>
  <!-- Handle -->
  <rect x="34" y="38" width="6" height="16" rx="3" transform="rotate(-25 37 46)" fill="#6ee7b7"/>
  <!-- Ball -->
  <circle cx="48" cy="13" r="5" fill="#34d399"/>
  <!-- Motion lines -->
  <line x1="54" y1="9" x2="59" y2="5" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="55" y1="15" x2="60" y2="15" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="53" y1="20" x2="58" y2="23" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
